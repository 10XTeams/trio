<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trio — Edit</title>
  <style>
    /* ── Theme custom properties ── */
    :root {
      --font-size: 16px;
      --topbar-height: 48px;

      /* Light theme (default) */
      --bg: #ffffff;
      --text: #1a1a1a;
      --sidebar-bg: #f5f5f5;
      --sidebar-text: #333333;
      --border: #e0e0e0;
      --accent: #2563eb;
      --hover: #e8e8e8;
      --topbar-bg: #fafafa;
      --toast-bg: #333333;
      --toast-text: #ffffff;
    }

    [data-theme="dark"] {
      --bg: #1e1e1e;
      --text: #d4d4d4;
      --sidebar-bg: #252526;
      --sidebar-text: #cccccc;
      --border: #3e3e3e;
      --accent: #569cd6;
      --hover: #2a2d2e;
      --topbar-bg: #2d2d2d;
      --toast-bg: #d4d4d4;
      --toast-text: #1e1e1e;
    }

    /* ── Reset & base ── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html, body {
      height: 100vh;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
        Ubuntu, Cantarell, "Fira Sans", "Droid Sans", "Helvetica Neue", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .layout {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }

    /* ── Top toolbar ── */
    .toolbar {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 0 16px;
      height: var(--topbar-height);
      border-bottom: 1px solid var(--border);
      background: var(--topbar-bg);
      flex-shrink: 0;
    }

    .toolbar .file-name {
      font-weight: 600;
      font-size: 0.95rem;
      flex: 1;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .toolbar button {
      padding: 6px 14px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
      font-size: 0.85rem;
    }

    .toolbar button:hover {
      background: var(--hover);
    }

    .toolbar button.primary {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .toolbar button.primary:hover {
      opacity: 0.9;
    }

    /* ── Editor toolbar ── */
    .editor-toolbar {
      display: flex;
      align-items: center;
      gap: 2px;
      padding: 4px 24px;
      border-bottom: 1px solid var(--border);
      background: var(--topbar-bg);
      flex-wrap: wrap;
      flex-shrink: 0;
    }

    .editor-toolbar button {
      padding: 4px 8px;
      font-size: 0.8rem;
      min-width: 28px;
      text-align: center;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text);
      border-radius: 4px;
      cursor: pointer;
    }

    .editor-toolbar button:hover {
      background: var(--hover);
      border-color: var(--border);
    }

    .toolbar-divider {
      width: 1px;
      height: 20px;
      background: var(--border);
      margin: 0 6px;
    }

    /* ── Editor container — split pane ── */
    .editor-container {
      flex: 1;
      display: flex;
      overflow: hidden;
      background: var(--bg);
    }

    .editor-source {
      flex: 1;
      display: flex;
      flex-direction: column;
      border-right: 1px solid var(--border);
      min-width: 0;
    }

    .editor-source textarea {
      flex: 1;
      width: 100%;
      padding: 24px;
      border: none;
      outline: none;
      resize: none;
      background: var(--bg);
      color: var(--text);
      font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
      font-size: var(--font-size);
      line-height: 1.7;
      tab-size: 4;
    }

    .pane-label {
      padding: 4px 16px;
      font-size: 0.75rem;
      color: var(--sidebar-text);
      background: var(--topbar-bg);
      border-bottom: 1px solid var(--border);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      flex-shrink: 0;
    }

    .editor-preview {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .preview-body {
      flex: 1;
      overflow-y: auto;
      padding: 24px;
      font-size: var(--font-size);
      line-height: 1.7;
    }

    /* ── Preview rendered styles ── */
    .preview-body h1, .preview-body h2, .preview-body h3 {
      color: var(--text);
      margin: 1rem 0 0.5rem;
    }

    .preview-body p {
      margin: 0.5rem 0;
    }

    .preview-body blockquote {
      border-left: 4px solid var(--accent);
      padding-left: 1rem;
      margin: 0.75rem 0;
      color: var(--sidebar-text);
    }

    .preview-body pre {
      background: var(--sidebar-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      overflow-x: auto;
    }

    .preview-body code {
      background: var(--sidebar-bg);
      padding: 2px 6px;
      border-radius: 3px;
      font-size: 0.9em;
    }

    .preview-body pre code {
      background: none;
      padding: 0;
    }

    .preview-body table {
      border-collapse: collapse;
      width: 100%;
      margin: 0.75rem 0;
    }

    .preview-body th, .preview-body td {
      border: 1px solid var(--border);
      padding: 8px 12px;
      text-align: left;
    }

    .preview-body th {
      background: var(--sidebar-bg);
      font-weight: 600;
    }

    .preview-body hr {
      border: none;
      border-top: 2px solid var(--border);
      margin: 1.5rem 0;
    }

    .preview-body ul, .preview-body ol {
      padding-left: 2rem;
      margin: 0.5rem 0;
    }

    .preview-body li {
      margin: 0.2rem 0;
    }

    .preview-body a {
      color: var(--accent);
      text-decoration: underline;
    }

    .preview-body img {
      max-width: 100%;
      border-radius: 4px;
    }

    /* ── Toast ── */
    .toast-container {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .toast {
      padding: 10px 20px;
      background: var(--toast-bg);
      color: var(--toast-text);
      border-radius: 6px;
      font-size: 0.85rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    /* ── Loading state ── */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100%;
      color: var(--sidebar-text);
      font-style: italic;
    }
  </style>
</head>
<body>
  <div class="layout">
    <!-- Top toolbar -->
    <div class="toolbar">
      <span class="file-name" id="file-name">Loading...</span>
      <button id="btn-save" class="primary" title="Save (Ctrl+S)">Save</button>
      <button id="btn-cancel" title="Cancel (Esc)">Cancel</button>
    </div>

    <!-- Editor formatting toolbar -->
    <div class="editor-toolbar" id="editor-toolbar">
      <button data-cmd="toggleStrong" title="Bold (Ctrl+B)"><b>B</b></button>
      <button data-cmd="toggleEmphasis" title="Italic (Ctrl+I)"><i>I</i></button>
      <button data-cmd="toggleStrikethrough" title="Strikethrough"><s>S</s></button>
      <button data-cmd="toggleInlineCode" title="Inline Code">&lt;&gt;</button>
      <span class="toolbar-divider"></span>
      <button data-cmd="heading1" title="Heading 1">H1</button>
      <button data-cmd="heading2" title="Heading 2">H2</button>
      <button data-cmd="heading3" title="Heading 3">H3</button>
      <span class="toolbar-divider"></span>
      <button data-cmd="bulletList" title="Bullet List">&bull;</button>
      <button data-cmd="orderedList" title="Ordered List">1.</button>
      <span class="toolbar-divider"></span>
      <button data-cmd="blockquote" title="Blockquote">&ldquo;</button>
      <button data-cmd="codeBlock" title="Code Block">{ }</button>
      <button data-cmd="hr" title="Horizontal Rule">&mdash;</button>
      <span class="toolbar-divider"></span>
      <button data-cmd="link" title="Link">&#128279;</button>
      <button data-cmd="image" title="Image">&#128444;</button>
      <button data-cmd="table" title="Table">&#8862;</button>
    </div>

    <!-- Editor container — split pane -->
    <div class="editor-container" id="editor-container">
      <div class="editor-source">
        <div class="pane-label">Markdown</div>
        <textarea id="source-editor" spellcheck="false" placeholder="Type Markdown here..."></textarea>
      </div>
      <div class="editor-preview">
        <div class="pane-label">Preview</div>
        <div class="preview-body" id="preview-body"></div>
      </div>
    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script type="module" src="edit.js"></script>
</body>
</html>
