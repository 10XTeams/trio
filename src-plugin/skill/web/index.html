<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Top bar -->
  <div class="topbar">
    <span class="topbar-title">Trio Stage</span>
    <span class="topbar-version" title="Trio version">v1.6</span>
    <button id="btn-refresh" title="Refresh">&#x21bb;</button>
    <span id="folder-path" style="display:none;font-size:0.9rem;font-weight:600;opacity:0.6;margin-left:8px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:300px"></span>
    <div class="topbar-spacer"></div>
    <div class="note-nav">
      <button id="btn-note-prev" disabled title="Previous note">&larr;</button>
      <span id="note-nav-label"></span>
      <button id="btn-note-next" disabled title="Next note">&rarr;</button>
    </div>
    <div class="risk-nav" title="Navigate [!WARNING] quotes on this page">
      <span class="risk-nav-title">Risk</span>
      <button id="btn-risk-prev" disabled title="Previous warning">&larr;</button>
      <span id="risk-nav-label"></span>
      <button id="btn-risk-next" disabled title="Next warning">&rarr;</button>
    </div>
    <div class="font-controls">
      <button id="btn-font-down">A-</button>
      <span id="font-size-label">16px</span>
      <button id="btn-font-up">A+</button>
    </div>
    <button id="btn-theme">Dark</button>
  </div>

  <!-- Main layout -->
  <div class="main-layout">
    <!-- Sidebar -->
    <div class="sidebar" id="sidebar"></div>

    <!-- Divider -->
    <div class="divider" id="divider"></div>

    <!-- Content -->
    <div class="content">
      <!-- Content toolbar -->
      <div class="content-toolbar" id="content-toolbar">
        <button id="btn-back" title="Back">&larr; Back</button>
        <span class="file-name" id="file-name"></span>
        <button id="btn-edit" title="Edit">Edit</button>
        <button id="btn-save-json" title="Save JSON">Save</button>
      </div>

      <!-- Welcome screen -->
      <div class="welcome" id="welcome">
        <h2>Welcome to Trio</h2>
        <p>A lightweight, browser-based wiki that works with local Markdown files. Loading your folder…</p>
      </div>

      <!-- Content body: preview + outline -->
      <div class="content-body">
        <div class="outline-panel" id="outline-panel">
          <div class="outline-title">Outline</div>
          <div class="outline-list" id="outline-list"></div>
        </div>
        <div class="outline-divider" id="outline-divider"></div>
        <div class="markdown-preview" id="markdown-preview">
          <div class="md-line-gutter" id="md-line-gutter" aria-hidden="true"></div>
          <div class="md-preview-content" id="md-preview-content"></div>
        </div>
      </div>

    </div>
  </div>

  <!-- Toast container -->
  <div class="toast-container" id="toast-container"></div>

  <script src="lib/mermaid.min.js"></script>
  <script>
    // Cache-bust app.js on every load so updates are never pinned by browser module cache.
    (function () {
      const bust = (new URL(location.href).searchParams.get('v')) || String(Date.now());
      const s = document.createElement('script');
      s.type = 'module';
      s.src = 'app.js?v=' + encodeURIComponent(bust);
      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
